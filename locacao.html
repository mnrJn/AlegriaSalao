<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container-conteudo">
        <div class="container-form">
            <div class="header-form">
                <span>Registro de Locação</span>
            </div>
            <div class="form">
                <form action="locacao.php" method="post">
                        <div class="input-coluna">
                            <div class="input">
                                <label for="id_locacao">Id da Locação</label>
                                <input type="text" name="id_locacao" id="id_locacao" placeholder="Ex: 12">
                            </div>
                            <div class="input">
                                <label for="nome_cliente">Nome do Cliente</label>
                                <input type="text" name="nome_cliente" id="nome_cliente" placeholder="Ex: Gustavo">
                            </div>
                            <div class="input">
                                <label for="horario_inicio">Data do Evento</label>
                                <input type="text" name="data_evento" id="data_evento" placeholder="Ex: 12/07">
                            </div>
                            <div class="input">
                                <label for="horario_inicio">Horario do Evento</label>
                                <input type="text" name="horario_inicio" id="horario_inicio" placeholder="Ex: 12:45">
                            </div>
                            <div class="input">
                                <label for="horario_fim">Horario do Fim</label>
                                <input type="text" name="horario_fim" id="horario_fim" placeholder="Ex: 17:00">
                            </div>
                        </div>
                        <div class="input-coluna">
                            <div class="input">
                                <label for="tipo_evento">Tipo de Evento</label>
                                <input type="text" name="tipo_evento" id="tipo_evento" placeholder="Ex: Festa">
                            </div>
                            <div class="input">
                                <label for="quantidade_convidados">Quantidade de Convidados</label>
                                <input type="text" name="quantidade_convidados" id="quantidade_convidados" placeholder="Ex: 30">
                            </div>
                            <div class="input">
                                <label for="valor_locacao">Valor</label>
                                <input type="text" name="valor_locacao" id="valor_locacao" placeholder="Ex: R$400,00">
                            </div>
                            <div class="input">
                                <label for="status_locacao">Status</label>
                                <input type="text" name="status_locacao" id="status_locacao" placeholder="Ex: Espera">
                            </div>
                            <div class="input">
                                <label for="observacoes">Observação</label>
                                <input type="text" name="observacoes" id="observacoes" placeholder="Ex: Sem pula-pula">
                            </div>
                        </div>
                    <div class="button">
                        <button type="submit">Registrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
