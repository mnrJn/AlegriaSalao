<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container-conteudo">
        <div class="container-form">
            <div class="header-form">
                <span>Registro</span>
            </div>
            <div class="form">
                <form action="registro.php" method="post">
                    <div class="input">
                        <label for="nome">Id do Cliente</label>
                        <input type="text" name="idcliente" id="idcliente" placeholder="Ex: 12">
                    </div>
                    <div class="input">
                        <label for="nome">Nome</label>
                        <input type="text" name="nome" id="nome" placeholder="Ex: Gustavo">
                    </div>
                    <div class="input">
                        <label for="cpf">Cpf</label>
                        <input type="text" name="cpf" id="cpf" placeholder="Ex: 321.832.971-12">
                    </div>
                    <div class="input">
                        <label for="telefone">Telefone</label>
                        <input type="text" name="telefone" id="telefone" placeholder="Ex: 21 97513-2186">
                    </div>
                    <div class="input">
                        <label for="email">Email</label>
                        <input type="text" name="email" id="email" placeholder="Ex: LucasCraft1100@gmail.com">
                    </div>
                    <div class="button">
                        <button type="submit">Registrar</button>
                    </div>
                </form>
            </div>
            <div class="registro">
                <span>Caso já tenha uma conta faça login <a href="login.html">aqui</a></span>
            </div>
        </div>
    </div>
</body>
</html>
